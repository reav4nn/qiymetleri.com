services:
  # FastAPI backend
  - type: web
    name: qiymetleri-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # Celery worker (scraper task queue)
  - type: worker
    name: qiymetleri-celery
    runtime: docker
    dockerfilePath: ./scraper/Dockerfile
    dockerContext: .
    plan: free
    startCommand: celery -A celery_app worker --loglevel=info --concurrency=1 -Q scraping,celery
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PROXY_ENABLED
        value: "false"
