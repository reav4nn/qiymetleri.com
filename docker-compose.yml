services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: qiymetleri_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qiymetleri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-qiymetleri}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qiymetleri}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qiymetleri_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - internal
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qiymetleri_backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qiymetleri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-qiymetleri}
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
    ports:
      - "8000:8000"
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADSENSE_ID: ${NEXT_PUBLIC_ADSENSE_ID:-}
        NEXT_PUBLIC_AD_SLOT_HOME: ${NEXT_PUBLIC_AD_SLOT_HOME:-}
        NEXT_PUBLIC_AD_SLOT_SEARCH: ${NEXT_PUBLIC_AD_SLOT_SEARCH:-}
        NEXT_PUBLIC_AD_SLOT_PRODUCT: ${NEXT_PUBLIC_AD_SLOT_PRODUCT:-}
    container_name: qiymetleri_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_ADSENSE_ID: ${NEXT_PUBLIC_ADSENSE_ID:-}
      NEXT_PUBLIC_AD_SLOT_HOME: ${NEXT_PUBLIC_AD_SLOT_HOME:-}
      NEXT_PUBLIC_AD_SLOT_SEARCH: ${NEXT_PUBLIC_AD_SLOT_SEARCH:-}
      NEXT_PUBLIC_AD_SLOT_PRODUCT: ${NEXT_PUBLIC_AD_SLOT_PRODUCT:-}
    ports:
      - "3000:3000"
    networks:
      - internal
      - public
    depends_on:
      - backend
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: qiymetleri_scraper
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qiymetleri}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-qiymetleri}
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      PROXY_ENABLED: ${PROXY_ENABLED:-false}
      PROXY_HOST: ${PROXY_HOST:-brd.superproxy.io}
      PROXY_PORT: ${PROXY_PORT:-22225}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      PROXY_COUNTRY: ${PROXY_COUNTRY:-az}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - scraper
    restart: "no"

  celery-worker:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: qiymetleri_celery_worker
    command: celery -A celery_app worker --loglevel=info --concurrency=1 -Q scraping,celery
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qiymetleri}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-qiymetleri}
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      PROXY_ENABLED: ${PROXY_ENABLED:-false}
      PROXY_HOST: ${PROXY_HOST:-brd.superproxy.io}
      PROXY_PORT: ${PROXY_PORT:-22225}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      PROXY_COUNTRY: ${PROXY_COUNTRY:-az}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: qiymetleri_celery_beat
    command: celery -A celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qiymetleri}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-qiymetleri}
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
    networks:
      - internal
    depends_on:
      - celery-worker
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: qiymetleri_nginx
    ports:
      - "80:80"
    networks:
      - internal
      - public
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

networks:
  internal:
    internal: true
  public:

volumes:
  pgdata:
  redisdata:
