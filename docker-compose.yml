services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: qiymetleri_postgres
    environment:
      POSTGRES_USER: qiymetleri
      POSTGRES_PASSWORD: qiymetleri_secret
      POSTGRES_DB: qiymetleri
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qiymetleri"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qiymetleri_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qiymetleri_backend
    environment:
      POSTGRES_USER: qiymetleri
      POSTGRES_PASSWORD: qiymetleri_secret
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: qiymetleri
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADSENSE_ID: ${NEXT_PUBLIC_ADSENSE_ID:-}
        NEXT_PUBLIC_AD_SLOT_HOME: ${NEXT_PUBLIC_AD_SLOT_HOME:-}
        NEXT_PUBLIC_AD_SLOT_SEARCH: ${NEXT_PUBLIC_AD_SLOT_SEARCH:-}
        NEXT_PUBLIC_AD_SLOT_PRODUCT: ${NEXT_PUBLIC_AD_SLOT_PRODUCT:-}
    container_name: qiymetleri_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_ADSENSE_ID: ${NEXT_PUBLIC_ADSENSE_ID:-}
      NEXT_PUBLIC_AD_SLOT_HOME: ${NEXT_PUBLIC_AD_SLOT_HOME:-}
      NEXT_PUBLIC_AD_SLOT_SEARCH: ${NEXT_PUBLIC_AD_SLOT_SEARCH:-}
      NEXT_PUBLIC_AD_SLOT_PRODUCT: ${NEXT_PUBLIC_AD_SLOT_PRODUCT:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: qiymetleri_scraper
    environment:
      DATABASE_URL: postgresql://qiymetleri:qiymetleri_secret@postgres:5432/qiymetleri
      PROXY_ENABLED: ${PROXY_ENABLED:-false}
      PROXY_HOST: ${PROXY_HOST:-brd.superproxy.io}
      PROXY_PORT: ${PROXY_PORT:-22225}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      PROXY_COUNTRY: ${PROXY_COUNTRY:-az}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - scraper
    restart: "no"

  celery-worker:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: qiymetleri_celery_worker
    command: celery -A celery_app worker --loglevel=info --concurrency=1 -Q scraping,celery
    environment:
      DATABASE_URL: postgresql://qiymetleri:qiymetleri_secret@postgres:5432/qiymetleri
      REDIS_URL: redis://redis:6379/0
      PROXY_ENABLED: ${PROXY_ENABLED:-false}
      PROXY_HOST: ${PROXY_HOST:-brd.superproxy.io}
      PROXY_PORT: ${PROXY_PORT:-22225}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      PROXY_COUNTRY: ${PROXY_COUNTRY:-az}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: qiymetleri_celery_beat
    command: celery -A celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://qiymetleri:qiymetleri_secret@postgres:5432/qiymetleri
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - celery-worker
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: qiymetleri_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
