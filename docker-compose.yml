services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: qiymetleri_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qiymetleri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-qiymetleri}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qiymetleri}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qiymetleri_redis
    env_file: .env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - internal
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-qiymetleri}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-qiymetleri}
    command: alembic upgrade head
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qiymetleri_backend
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-qiymetleri}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-qiymetleri}
      CACHE_REDIS_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      CELERY_BROKER_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/2
    ports:
      - "8000:8000"
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  seed-demo:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles:
      - demo
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qiymetleri}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-qiymetleri}
      CACHE_REDIS_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
    command: python -m scripts.seed_demo
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADSENSE_ID: ${NEXT_PUBLIC_ADSENSE_ID:-}
        NEXT_PUBLIC_AD_SLOT_HOME: ${NEXT_PUBLIC_AD_SLOT_HOME:-}
        NEXT_PUBLIC_AD_SLOT_SEARCH: ${NEXT_PUBLIC_AD_SLOT_SEARCH:-}
        NEXT_PUBLIC_AD_SLOT_PRODUCT: ${NEXT_PUBLIC_AD_SLOT_PRODUCT:-}
    container_name: qiymetleri_frontend
    env_file: .env
    environment:
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_ADSENSE_ID: ${NEXT_PUBLIC_ADSENSE_ID:-}
      NEXT_PUBLIC_AD_SLOT_HOME: ${NEXT_PUBLIC_AD_SLOT_HOME:-}
      NEXT_PUBLIC_AD_SLOT_SEARCH: ${NEXT_PUBLIC_AD_SLOT_SEARCH:-}
      NEXT_PUBLIC_AD_SLOT_PRODUCT: ${NEXT_PUBLIC_AD_SLOT_PRODUCT:-}
    ports:
      - "3000:3000"
    networks:
      - internal
      - public
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: qiymetleri_scraper
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qiymetleri}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-qiymetleri}
      CACHE_REDIS_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      CELERY_BROKER_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/2
      PROXY_ENABLED: ${PROXY_ENABLED:-false}
      PROXY_HOST: ${PROXY_HOST:-brd.superproxy.io}
      PROXY_PORT: ${PROXY_PORT:-22225}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      PROXY_COUNTRY: ${PROXY_COUNTRY:-az}
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    profiles:
      - scraper
    restart: "no"

  celery-worker:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: qiymetleri_celery_worker
    command: celery -A celery_app worker --loglevel=info --pool=solo -Q scraping,celery
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qiymetleri}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-qiymetleri}
      CACHE_REDIS_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      CELERY_BROKER_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/2
      PROXY_ENABLED: ${PROXY_ENABLED:-false}
      PROXY_HOST: ${PROXY_HOST:-brd.superproxy.io}
      PROXY_PORT: ${PROXY_PORT:-22225}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      PROXY_COUNTRY: ${PROXY_COUNTRY:-az}
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: qiymetleri_celery_beat
    command: celery -A celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qiymetleri}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-qiymetleri}
      CACHE_REDIS_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      CELERY_BROKER_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/2
    networks:
      - internal
    depends_on:
      - celery-worker
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: qiymetleri_nginx
    ports:
      - "80:80"
    networks:
      - internal
      - public
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

networks:
  internal:
    internal: true
  public:

volumes:
  pgdata:
  redisdata:
