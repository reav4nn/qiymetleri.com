services:
  # FastAPI backend
  - type: web
    name: qiymetleri-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CACHE_REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SPEC_IMPORT_SIGNING_KEY
        sync: false

  # Celery worker (scraper task queue)
  - type: worker
    name: qiymetleri-celery
    runtime: docker
    dockerfilePath: ./scraper/Dockerfile
    dockerContext: .
    plan: free
    startCommand: celery -A celery_app worker --loglevel=info --concurrency=1 -Q scraping,specs,celery
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CACHE_REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: PROXY_ENABLED
        value: "false"
      - key: INTERNAL_API_URL
        value: https://qiymetleri-backend.onrender.com
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OFFICIAL_SPEC_SOURCES
        sync: false

  - type: worker
    name: qiymetleri-celery-beat
    runtime: docker
    dockerfilePath: ./scraper/Dockerfile
    dockerContext: .
    plan: free
    startCommand: celery -A celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CACHE_REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: INTERNAL_API_URL
        value: https://qiymetleri-backend.onrender.com
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OFFICIAL_SPEC_SOURCES
        sync: false
