services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: qiymetleri_postgres
    environment:
      POSTGRES_USER: qiymetleri
      POSTGRES_PASSWORD: qiymetleri_secret
      POSTGRES_DB: qiymetleri
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qiymetleri"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qiymetleri_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qiymetleri_backend
    environment:
      POSTGRES_USER: qiymetleri
      POSTGRES_PASSWORD: qiymetleri_secret
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: qiymetleri
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qiymetleri_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: qiymetleri_scraper
    environment:
      DATABASE_URL: postgresql://qiymetleri:qiymetleri_secret@postgres:5432/qiymetleri
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - scraper
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    container_name: qiymetleri_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
